# Cloudflare Worker (with static assets) — serves the SPA and the /api routes.
name = "hackweek-workflow-decision-log"
main = "src/worker.ts"
compatibility_date = "2025-01-01"

# Static SPA built by `npm run build` into ./dist, served by the Worker.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 database used by /api routes.
[[d1_databases]]
binding = "DB"
database_name = "decision-log"
database_id = "ec46ded4-e9a2-4d7f-8bf5-426da5218c23"
