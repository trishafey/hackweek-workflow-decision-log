name: Deploy to GitHub Pages

# GitHub Pages serves a project site under /hackweek-workflow-decision-log/.
# Vite's base is "./" (relative), so the built assets resolve there and at the
# Cloudflare root alike. This builds dist/ and publishes it via the Pages
# artifact pipeline — it does NOT commit build output to any branch, so the
# Cloudflare Workers build (from source) is unaffected.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
