name: Deploy to GitHub Pages

on:
  # Build on every push to the working branch.
  push:
    branches: ["claude/vigilant-volta-jfbytz"]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Needs write access to push the built site to the `main` branch.
permissions:
  contents: write

concurrency:
  group: "pages-publish"
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Publish the built site to the `main` branch root so GitHub Pages can
      # serve it via "Deploy from a branch → main → / (root)".
      - name: Publish built site to main
        run: |
          cd dist
          touch .nojekyll
          git init -q
          git checkout -q -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${{ github.sha }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" main
